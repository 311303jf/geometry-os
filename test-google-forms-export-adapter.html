<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Geometry OS — Google Forms Export Adapter Test</title>
</head>
<body>
  <h1>Geometry OS — Google Forms Export Adapter Test</h1>

  <button id="runTestButton">Run Google Forms Export Adapter Test</button>

  <pre id="output"></pre>

  <script type="module">
    import { curriculumLoader } from "./src/curriculum/curriculumLoader.js";
    import { curriculumEngine } from "./src/curriculum/curriculumEngine.js";
    import { finalQuizResourceBuilder } from "./src/engine/generation/questions/finalQuizResourceBuilder.js";
    import { finalQuestionExportContract } from "./src/engine/generation/questions/finalQuestionExportContract.js";
    import { googleFormsExportAdapter } from "./src/engine/generation/export/googleFormsExportAdapter.js";

    const button = document.getElementById("runTestButton");
    const output = document.getElementById("output");

    button.addEventListener("click", async () => {
      try {
        const lessonBlueprint = await curriculumLoader.loadLesson({
          course: "Geometry",
          unit: "Unit 1",
          lesson: "1.1"
        });

        const lessonModel = curriculumEngine.buildLessonModel(lessonBlueprint);

        const finalResource = finalQuizResourceBuilder.build({
          lessonModel,
          generationContext: {
            lessonModel
          },
          resourceType: "quiz",
          count: 20
        });

        const exportContract = finalQuestionExportContract.buildContract({
          finalResource,
          exportTarget: "google_forms"
        });

        const adaptedPayload = googleFormsExportAdapter.adapt({
          exportContract
        });

        const items = adaptedPayload.form.items || [];
        const answerKey = adaptedPayload.answerKey || [];

        const allItemsMultipleChoice = items.every(
          (item) => item.type === "multiple_choice"
        );

        const allItemsRequired = items.every(
          (item) => item.required === true
        );

        const allItemsHaveFourChoices = items.every(
          (item) =>
            Array.isArray(item.choices) &&
            item.choices.length === 4
        );

        const allItemsHavePoints = items.every(
          (item) => item.points === 1
        );

        const allAnswerKeysMapped = answerKey.every(
          (key) =>
            Boolean(key.itemId) &&
            Boolean(key.correctChoice) &&
            Boolean(key.correctAnswer)
        );

        const result = {
          test: "Google Forms Export Adapter v0.9.5",
          adapterVersion: adaptedPayload.adapterVersion,
          exportTarget: adaptedPayload.exportTarget,
          sourceContractVersion: adaptedPayload.sourceContractVersion,
          isQuiz: adaptedPayload.form.settings.isQuiz,
          itemCount: items.length,
          answerKeyCount: answerKey.length,
          allItemsMultipleChoice,
          allItemsRequired,
          allItemsHaveFourChoices,
          allItemsHavePoints,
          allAnswerKeysMapped,
          readyForPublishing: adaptedPayload.metadata.readyForPublishing,
          callsGoogleApi: adaptedPayload.metadata.callsGoogleApi,
          publishesResource: adaptedPayload.metadata.publishesResource
        };

        result.pass =
          result.test === "Google Forms Export Adapter v0.9.5" &&
          result.adapterVersion === "v0.9.5" &&
          result.exportTarget === "google_forms" &&
          result.sourceContractVersion === "v0.9.4" &&
          result.isQuiz === true &&
          result.itemCount === 20 &&
          result.answerKeyCount === 20 &&
          result.allItemsMultipleChoice === true &&
          result.allItemsRequired === true &&
          result.allItemsHaveFourChoices === true &&
          result.allItemsHavePoints === true &&
          result.allAnswerKeysMapped === true &&
          result.readyForPublishing === true &&
          result.callsGoogleApi === false &&
          result.publishesResource === false;

        output.textContent = JSON.stringify(result, null, 2);
      } catch (error) {
        output.textContent = error.stack || error.message;
      }
    });
  </script>
</body>
</html>
