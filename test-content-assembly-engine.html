<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Geometry OS — Content Assembly Engine Test</title>
</head>
<body>
  <h1>Geometry OS — Content Assembly Engine Test</h1>

  <button id="runTestButton">Run Content Assembly Engine Test</button>

  <pre id="output"></pre>

  <script type="module">
    import { contentGeneratorRegistry } from "./src/engine/generation/contentGeneratorRegistry.js";
    import { registerContentGenerators } from "./src/engine/generation/registerContentGenerators.js";
    import { generationExecutionEngine } from "./src/engine/generation/generationExecutionEngine.js";
    import { contentAssemblyEngine } from "./src/engine/generation/contentAssemblyEngine.js";

    const button = document.getElementById("runTestButton");
    const output = document.getElementById("output");

    button.addEventListener("click", () => {
      try {
        contentGeneratorRegistry.clear();

        const registeredGenerators = registerContentGenerators({
          registry: contentGeneratorRegistry
        });

        const generationContext = {
          lessonId: "Geometry-Unit 1-1.1",
          lesson: {
            id: "Geometry-Unit 1-1.1",
            course: "Geometry",
            unit: "Unit 1",
            lesson: "1.1",
            lessonTitle: "The Language of Geometry",
            objectives: [
              "Identify and name basic geometric figures.",
              "Use correct notation for points, lines, segments, rays, and angles."
            ],
            assessmentTargets: [
              "Identify points, lines, segments, rays, and angles.",
              "Use correct geometric notation."
            ]
          },
          instructionPlan: {
            objectives: [
              "Identify and name basic geometric figures.",
              "Use correct notation for points, lines, segments, rays, and angles."
            ]
          },
          knowledgeGraph: { metadata: { graphVersion: "v0.2.3" } },
          dependencyAnalysis: {
            summary: "Dependencies analyzed for Geometry Unit 1 Lesson 1.1."
          },
          instructionSequence: { metadata: { sequenceVersion: "v0.2.6" } },
          instructionDecisions: { metadata: { decisionVersion: "v0.2.7" } }
        };

        const generationQueue = {
          generationContext,
          queueItems: [
            {
              queueId: "generation_queue_item_1",
              order: 1,
              assetType: "bell_ringer",
              generatorId: "bell_ringer_generator"
            },
            {
              queueId: "generation_queue_item_2",
              order: 2,
              assetType: "teacher_playbook",
              generatorId: "teacher_playbook_generator"
            },
            {
              queueId: "generation_queue_item_3",
              order: 3,
              assetType: "student_notes",
              generatorId: "student_notes_generator"
            },
            {
              queueId: "generation_queue_item_4",
              order: 4,
              assetType: "guided_practice",
              generatorId: "guided_practice_generator"
            },
            {
              queueId: "generation_queue_item_5",
              order: 5,
              assetType: "independent_practice",
              generatorId: "independent_practice_generator"
            },
            {
              queueId: "generation_queue_item_6",
              order: 6,
              assetType: "homework",
              generatorId: "homework_generator"
            },
            {
              queueId: "generation_queue_item_7",
              order: 7,
              assetType: "exit_ticket",
              generatorId: "exit_ticket_generator"
            },
            {
              queueId: "generation_queue_item_8",
              order: 8,
              assetType: "quiz",
              generatorId: "quiz_generator"
            },
            {
              queueId: "generation_queue_item_9",
              order: 9,
              assetType: "recovery",
              generatorId: "recovery_generator"
            }
          ]
        };

        const executionResult =
          generationExecutionEngine.executeQueue(generationQueue);

        const contentPackage =
          contentAssemblyEngine.assemble(executionResult);

        const requiredAssetTypes = [
          "bell_ringer",
          "teacher_playbook",
          "student_notes",
          "guided_practice",
          "independent_practice",
          "homework",
          "exit_ticket",
          "quiz",
          "recovery"
        ];

        const missingSections = requiredAssetTypes.filter((assetType) => {
          return !contentPackage.sections.some(
            (section) =>
              section.assetType === assetType &&
              section.contentGenerated === true &&
              section.content
          );
        });

        if (
          registeredGenerators.length !== 9 ||
          executionResult.status !== "content_generated" ||
          executionResult.contentGenerated !== true ||
          executionResult.totalExecutionRecords !== 9 ||
          executionResult.generatedCount !== 9 ||
          contentPackage.status !== "content_package_assembled" ||
          contentPackage.contentAssembled !== true ||
          contentPackage.totalSections !== 9 ||
          contentPackage.sections.length !== 9 ||
          missingSections.length > 0
        ) {
          throw new Error(
            "Content Assembly Engine failed for v0.5.0. Missing sections: " +
              missingSections.join(", ")
          );
        }

        output.textContent =
          "PASS — Content Assembly Engine v0.5.0\n\n" +
          JSON.stringify(
            {
              registeredGenerators,
              executionResult,
              contentPackage
            },
            null,
            2
          );
      } catch (error) {
        output.textContent =
          "FAIL — Content Assembly Engine v0.5.0\n\n" +
          error.message;
        console.error(error);
      }
    });
  </script>
</body>
</html>
