<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Geometry OS — Learning Intelligence Test</title>
</head>
<body>
  <h1>Geometry OS — Learning Intelligence Test</h1>

  <button id="runTestButton">Run Learning Intelligence Test</button>

  <pre id="output"></pre>

  <script type="module">
    import { curriculumLoader } from "./src/curriculum/curriculumLoader.js";
    import { curriculumEngine } from "./src/curriculum/curriculumEngine.js";
    import { learningIntelligenceEngine } from "./src/curriculum/learningIntelligenceEngine.js";

    const button = document.getElementById("runTestButton");
    const output = document.getElementById("output");

    button.addEventListener("click", async () => {
      try {
        output.textContent = "Loading Lesson 1.1...";

        const lessonBlueprint = await curriculumLoader.loadLesson({
          course: "Geometry",
          unit: "Unit 1",
          lesson: "1.1"
        });

        const lessonModel = curriculumEngine.buildLessonModel(lessonBlueprint);

        const instructionPlan =
          learningIntelligenceEngine.buildInstructionPlan(lessonModel);

        output.textContent = JSON.stringify(instructionPlan, null, 2);

        console.log("Learning Intelligence Test PASS:", instructionPlan);
      } catch (error) {
        output.textContent = "ERROR:\n" + error.message;
        console.error("Learning Intelligence Test FAIL:", error);
      }
    });
  </script>
</body>
</html>
