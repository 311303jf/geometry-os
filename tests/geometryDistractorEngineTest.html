<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Geometry OS — Geometry Distractor Engine Test
  </title>

  <style>
    body {
      margin: 32px;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
      color: #17202a;
    }

    h1 {
      margin-bottom: 16px;
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.7;
    }

    pre {
      margin-top: 20px;
      padding: 20px;
      min-height: 120px;
      background: #111827;
      color: #e5e7eb;
      border-radius: 8px;
      overflow: auto;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <h1>
    Geometry OS — Geometry Distractor Engine Test
  </h1>

  <p>
    Runs each certified template through 20 different seeds (460
    total runs) to catch coincidental collisions between distractor
    formulas and the correct answer — a single-seed run is not
    sufficient to certify this engine.
  </p>

  <button id="runTestButton">
    Run Geometry Distractor Engine Test
  </button>

  <pre id="output">Ready.</pre>

  <script>
    const button = document.getElementById("runTestButton");
    const output = document.getElementById("output");

    const templateCases = [
      { templateId: "identify_point_from_description", problemTypeId: "identify_point" },
      { templateId: "identify_line_from_labels", problemTypeId: "identify_line" },
      { templateId: "identify_segment_from_endpoints", problemTypeId: "identify_segment" },
      { templateId: "identify_ray_from_endpoint", problemTypeId: "identify_ray" },
      { templateId: "identify_plane_from_points", problemTypeId: "identify_plane" },
      { templateId: "identify_angle_from_rays", problemTypeId: "identify_angle" },
      { templateId: "classify_angle_by_measure", problemTypeId: "classify_angle" },
      { templateId: "measure_angle_from_relationship", problemTypeId: "measure_angle" },
      { templateId: "identify_complementary_angle_pair", problemTypeId: "identify_complementary_angles" },
      { templateId: "identify_supplementary_angle_pair", problemTypeId: "identify_supplementary_angles" },
      { templateId: "identify_vertical_angle_pair", problemTypeId: "identify_vertical_angles" },
      { templateId: "identify_adjacent_angle_pair", problemTypeId: "identify_adjacent_angles" },
      { templateId: "classify_polygon_by_sides", problemTypeId: "classify_polygon" },
      { templateId: "identify_polygon_from_attributes", problemTypeId: "identify_polygon" },
      { templateId: "classify_triangle_by_sides", problemTypeId: "classify_triangle" },
      { templateId: "classify_triangle_by_angles", problemTypeId: "classify_triangle" },
      { templateId: "triangle_angle_sum_missing_angle", problemTypeId: "triangle_angle_sum" },
      { templateId: "distance_between_two_points", problemTypeId: "distance_formula" },
      { templateId: "midpoint_between_two_points", problemTypeId: "midpoint" },
      { templateId: "identify_translation_from_rule", problemTypeId: "identify_translation" },
      { templateId: "identify_reflection_from_rule", problemTypeId: "identify_reflection" },
      { templateId: "identify_rotation_from_rule", problemTypeId: "identify_rotation" },
      { templateId: "identify_dilation_from_scale_factor", problemTypeId: "identify_dilation" }
    ];

    const SEEDS_PER_TEMPLATE = 20;

    function assert(condition, message) {
      if (!condition) {
        throw new Error(message);
      }
    }

    button.addEventListener("click", async () => {
      button.disabled = true;
      output.textContent = "Loading Geometry OS modules...";

      try {
        const resolverModule = await import(
          "../src/geometry/templates/geometryTemplateResolver.js"
        );

        const generatorModule = await import(
          "../src/geometry/generation/geometryVariableGenerator.js"
        );

        const solverModule = await import(
          "../src/engine/solver/geometrySolver.js"
        );

        const distractorModule = await import(
          "../src/engine/distractors/geometryDistractorEngine.js"
        );

        const { geometryTemplateResolver } = resolverModule;
        const { geometryVariableGenerator } = generatorModule;
        const { geometrySolver } = solverModule;
        const { geometryDistractorEngine } = distractorModule;

        assert(
          geometryDistractorEngine &&
          typeof geometryDistractorEngine.generate === "function",
          "Geometry Distractor Engine did not load correctly."
        );

        output.textContent =
          `Modules loaded. Running ${templateCases.length} templates x ${SEEDS_PER_TEMPLATE} seeds...`;

        const failures = [];
        let totalRuns = 0;
        const exampleByTemplate = {};

        templateCases.forEach((templateCase) => {
          for (let seedIndex = 0; seedIndex < SEEDS_PER_TEMPLATE; seedIndex++) {
            totalRuns += 1;

            const resolution = geometryTemplateResolver.resolve({
              templateId: templateCase.templateId,
              problemTypeId: templateCase.problemTypeId
            });

            const generation = geometryVariableGenerator.generate(
              resolution,
              {
                seed: `distractor-certification-${templateCase.templateId}-${seedIndex}`,
                generationIndex: seedIndex
              }
            );

            if (!generation.generated) {
              failures.push({
                templateId: templateCase.templateId,
                seedIndex,
                stage: "generator",
                errors: generation.errors
              });
              continue;
            }

            const solveResult = geometrySolver.solve({
              templateId: templateCase.templateId,
              problemTypeId: templateCase.problemTypeId,
              variables: generation.variables
            });

            if (!solveResult.solved) {
              failures.push({
                templateId: templateCase.templateId,
                seedIndex,
                stage: "solver",
                errors: solveResult.errors
              });
              continue;
            }

            const distractorResult = geometryDistractorEngine.generate({
              templateId: templateCase.templateId,
              problemTypeId: templateCase.problemTypeId,
              variables: generation.variables,
              correctAnswer: solveResult.correctAnswer,
              acceptableAnswers: solveResult.acceptableAnswers
            });

            const distractorsValid =
              distractorResult.generated &&
              Array.isArray(distractorResult.distractors) &&
              distractorResult.distractors.length === 3 &&
              new Set(
                distractorResult.distractors.map((d) => JSON.stringify(d))
              ).size === 3;

            if (!distractorsValid) {
              failures.push({
                templateId: templateCase.templateId,
                seedIndex,
                stage: "distractors",
                correctAnswer: solveResult.correctAnswer,
                distractors: distractorResult.distractors,
                errors: distractorResult.errors
              });
              continue;
            }

            if (!exampleByTemplate[templateCase.templateId]) {
              exampleByTemplate[templateCase.templateId] = {
                correctAnswer: solveResult.correctAnswer,
                distractors: distractorResult.distractors
              };
            }
          }
        });

        assert(
          failures.length === 0,
          `Distractor certification failed for ${failures.length} of ${totalRuns} runs. First failure: ${JSON.stringify(failures[0])}`
        );

        const supportedTemplateIds =
          geometryDistractorEngine.getSupportedTemplateIds();

        assert(
          supportedTemplateIds.length === 23,
          "Supported template count must equal 23."
        );

        const result = {
          test: "Geometry Distractor Engine",
          engineVersion: geometryDistractorEngine.getEngineVersion(),
          certifiedTemplateCount: templateCases.length,
          seedsPerTemplate: SEEDS_PER_TEMPLATE,
          totalRuns,
          failureCount: failures.length,
          allRunsPassed: failures.length === 0,
          examples: exampleByTemplate,
          pass: true
        };

        output.textContent =
          "PASS — Geometry Distractor Engine " +
          result.engineVersion +
          " (" + totalRuns + " runs, 0 failures)\n\n" +
          JSON.stringify(result, null, 2);
      } catch (error) {
        const failureResult = {
          test: "Geometry Distractor Engine",
          pass: false,
          errorName: error && error.name ? error.name : "Error",
          error: error instanceof Error ? error.message : String(error),
          stack: error instanceof Error ? error.stack : null,
          diagnostic:
            "Verify that geometryDistractorEngine.js exists at src/engine/distractors/geometryDistractorEngine.js and that the page is opened through the project web server rather than directly with file://."
        };

        output.textContent =
          "FAIL — Geometry Distractor Engine\n\n" +
          JSON.stringify(failureResult, null, 2);
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
