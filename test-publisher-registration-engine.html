<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Geometry OS — Publisher Registration Engine Test</title>
</head>
<body>
  <h1>Geometry OS — Publisher Registration Engine Test</h1>

  <button id="runTestButton">Run Publisher Registration Engine Test</button>

  <pre id="output"></pre>

  <script type="module">
    import { publisherRegistry } from "./src/engine/publishing/publisherRegistry.js";
    import { registerPublishers } from "./src/engine/publishing/registerPublishers.js";

    const button = document.getElementById("runTestButton");
    const output = document.getElementById("output");

    button.addEventListener("click", () => {
      try {
        publisherRegistry.clear();

        const registeredPublishers = registerPublishers({
          registry: publisherRegistry
        });

        const googleDocsPublisher = publisherRegistry.get("google_docs_publisher");
        const googleClassroomPublisher = publisherRegistry.get("google_classroom_publisher");
        const pdfPublisher = publisherRegistry.get("pdf_publisher");
        const htmlPublisher = publisherRegistry.get("html_publisher");
        const jsonApiPublisher = publisherRegistry.get("json_api_publisher");

        const preparedGoogleDocsContract = googleDocsPublisher.prepare({
          lessonId: "Geometry-1.1",
          sections: []
        });

        const result = {
          test: "Publisher Registration Engine v0.6.1",
          registeredCount: publisherRegistry.count(),
          returnedPublisherCount: registeredPublishers.length,

          hasGoogleDocsPublisher: publisherRegistry.has("google_docs_publisher"),
          hasGoogleClassroomPublisher: publisherRegistry.has("google_classroom_publisher"),
          hasPdfPublisher: publisherRegistry.has("pdf_publisher"),
          hasHtmlPublisher: publisherRegistry.has("html_publisher"),
          hasJsonApiPublisher: publisherRegistry.has("json_api_publisher"),

          googleDocsPublisherName: googleDocsPublisher.publisherName,
          googleClassroomPublisherName: googleClassroomPublisher.publisherName,
          pdfPublisherName: pdfPublisher.publisherName,
          htmlPublisherName: htmlPublisher.publisherName,
          jsonApiPublisherName: jsonApiPublisher.publisherName,

          preparedGoogleDocsStatus: preparedGoogleDocsContract.status,
          preparedGoogleDocsTarget: preparedGoogleDocsContract.target,

          registeredPublishers: publisherRegistry.list().map((publisher) => ({
            publisherId: publisher.publisherId,
            publisherName: publisher.publisherName,
            publisherVersion: publisher.publisherVersion,
            publisherType: publisher.publisherType
          })),

          pass:
            publisherRegistry.count() === 5 &&
            registeredPublishers.length === 5 &&
            publisherRegistry.has("google_docs_publisher") &&
            publisherRegistry.has("google_classroom_publisher") &&
            publisherRegistry.has("pdf_publisher") &&
            publisherRegistry.has("html_publisher") &&
            publisherRegistry.has("json_api_publisher") &&
            preparedGoogleDocsContract.status === "publisher_contract_prepared" &&
            preparedGoogleDocsContract.target === "google_docs"
        };

        output.textContent = JSON.stringify(result, null, 2);
      } catch (error) {
        output.textContent = JSON.stringify({
          test: "Publisher Registration Engine v0.6.1",
          pass: false,
          error: error.message
        }, null, 2);
      }
    });
  </script>
</body>
</html>
