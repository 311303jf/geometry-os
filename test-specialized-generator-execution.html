<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Geometry OS — Specialized Generator Execution Test</title>
</head>
<body>
  <h1>Geometry OS — Specialized Generator Execution Test</h1>

  <button id="runTestButton">Run Specialized Generator Execution Test</button>

  <pre id="output"></pre>

  <script type="module">
    import { contentGeneratorRegistry } from "./src/engine/generation/contentGeneratorRegistry.js";
    import { registerContentGenerators } from "./src/engine/generation/registerContentGenerators.js";
    import { generationExecutionEngine } from "./src/engine/generation/generationExecutionEngine.js";

    const button = document.getElementById("runTestButton");
    const output = document.getElementById("output");

    button.addEventListener("click", () => {
      try {
        contentGeneratorRegistry.clear();

        const registeredGenerators = registerContentGenerators({
          registry: contentGeneratorRegistry
        });

        const generationQueue = {
          generationContext: {
            lessonId: "Geometry-Unit 1-1.1",
            lesson: {
              id: "Geometry-Unit 1-1.1",
              course: "Geometry",
              unit: "Unit 1",
              lesson: "1.1",
              lessonTitle: "The Language of Geometry",
              objectives: [
                "Identify and name basic geometric figures.",
                "Use correct notation for points, lines, segments, rays, and angles."
              ]
            },
            instructionPlan: {
              objectives: [
                "Identify and name basic geometric figures.",
                "Use correct notation for points, lines, segments, rays, and angles."
              ]
            },
            knowledgeGraph: { metadata: { graphVersion: "v0.2.3" } },
            dependencyAnalysis: {
              summary: "Dependencies analyzed for Geometry Unit 1 Lesson 1.1."
            },
            instructionSequence: { metadata: { sequenceVersion: "v0.2.6" } },
            instructionDecisions: { metadata: { decisionVersion: "v0.2.7" } }
          },
          queueItems: [
            {
              queueId: "generation_queue_item_1",
              order: 1,
              assetType: "bell_ringer",
              generatorId: "bell_ringer_generator"
            },
            {
              queueId: "generation_queue_item_2",
              order: 2,
              assetType: "teacher_playbook",
              generatorId: "teacher_playbook_generator"
            },
            {
              queueId: "generation_queue_item_3",
              order: 3,
              assetType: "student_notes",
              generatorId: "student_notes_generator"
            },
            {
              queueId: "generation_queue_item_4",
              order: 4,
              assetType: "guided_practice",
              generatorId: "guided_practice_generator"
            },
            {
              queueId: "generation_queue_item_5",
              order: 5,
              assetType: "independent_practice",
              generatorId: "independent_practice_generator"
            }
          ]
        };

        const result = generationExecutionEngine.executeQueue(generationQueue);

        const requiredGeneratorIds = [
          "bell_ringer_generator",
          "teacher_playbook_generator",
          "student_notes_generator",
          "guided_practice_generator",
          "independent_practice_generator"
        ];

        const missingGenerators = requiredGeneratorIds.filter((generatorId) => {
          return !result.executionRecords.some(
            (record) =>
              record.generatorId === generatorId &&
              record.status === "content_generated" &&
              record.contentGenerated === true &&
              record.output
          );
        });

        if (
          result.status !== "content_generated" ||
          result.contentGenerated !== true ||
          result.totalExecutionRecords !== 5 ||
          result.generatedCount !== 5 ||
          missingGenerators.length > 0
        ) {
          throw new Error(
            "Specialized generator execution bridge failed for v0.4.4. Missing: " +
              missingGenerators.join(", ")
          );
        }

        output.textContent =
          "PASS — Independent Practice Generator v0.4.4\n\n" +
          JSON.stringify(
            {
              registeredGenerators,
              ...result
            },
            null,
            2
          );
      } catch (error) {
        output.textContent =
          "FAIL — Independent Practice Generator v0.4.4\n\n" +
          error.message;
        console.error(error);
      }
    });
  </script>
</body>
</html>
