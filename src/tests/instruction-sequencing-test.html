<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Geometry OS — Instruction Sequencing Test</title>
</head>
<body>
  <h1>Geometry OS — Instruction Sequencing Test</h1>

  <button id="runTestButton">Run Instruction Sequencing Test</button>

  <pre id="output"></pre>

  <script type="module">
    import { curriculumLoader } from "../curriculum/curriculumLoader.js";
    import { curriculumEngine } from "../curriculum/curriculumEngine.js";
    import { learningIntelligenceEngine } from "../curriculum/learningIntelligenceEngine.js";
    import { knowledgeGraphEngine } from "../curriculum/knowledgeGraphEngine.js";
    import { knowledgeDependencyEngine } from "../knowledge/knowledgeDependencyEngine.js";
    import { instructionSequencingEngine } from "../instruction/instructionSequencingEngine.js";

    const button = document.getElementById("runTestButton");
    const output = document.getElementById("output");

    button.addEventListener("click", async () => {
      try {
        output.textContent = "Running Instruction Sequencing Test...";

        const lessonBlueprint = await curriculumLoader.loadLesson({
          course: "Geometry",
          unit: "Unit 1",
          lesson: "1.1"
        });

        const lessonModel =
          curriculumEngine.buildLessonModel(lessonBlueprint);

        const instructionPlan =
          learningIntelligenceEngine.buildInstructionPlan(lessonModel);

        const knowledgeGraph =
          knowledgeGraphEngine.buildGraph(instructionPlan);

        const dependencyAnalysis =
          knowledgeDependencyEngine.analyzeDependencies(knowledgeGraph);

        const instructionalSequence =
          instructionSequencingEngine.buildSequence(dependencyAnalysis);

        output.textContent = JSON.stringify(instructionalSequence, null, 2);

        console.log("Instruction Sequencing Test PASS:", instructionalSequence);
      } catch (error) {
        output.textContent = "ERROR:\n" + error.message;
        console.error("Instruction Sequencing Test FAIL:", error);
      }
    });
  </script>
</body>
</html>
