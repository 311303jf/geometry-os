<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Geometry OS — Generation Context Engine Test</title>
</head>
<body>
  <h1>Geometry OS — Generation Context Engine Test</h1>

  <button id="runTestButton">Run Generation Context Engine Test</button>

  <pre id="output"></pre>

  <script type="module">
    import { curriculumLoader } from "../curriculum/curriculumLoader.js";
    import { curriculumEngine } from "../curriculum/curriculumEngine.js";
    import { learningIntelligenceEngine } from "../curriculum/learningIntelligenceEngine.js";
    import { knowledgeGraphEngine } from "../curriculum/knowledgeGraphEngine.js";
    import { knowledgeDependencyEngine } from "../knowledge/knowledgeDependencyEngine.js";
    import { instructionSequencingEngine } from "../instruction/instructionSequencingEngine.js";
    import { instructionDecisionEngine } from "../curriculum/instructionDecisionEngine.js";
    import { instructionResourcePlanner } from "../instruction/instructionResourcePlanner.js";
    import { instructionAssetSpecificationEngine } from "../instruction/instructionAssetSpecificationEngine.js";
    import { contentGenerationOrchestrator } from "../engine/generation/contentGenerationOrchestrator.js";
    import { generationContextEngine } from "../engine/generation/generationContextEngine.js";

    const output = document.getElementById("output");
    const button = document.getElementById("runTestButton");

    button.addEventListener("click", async () => {
      try {
        output.textContent = "Running Generation Context Engine Test...\n\n";

        const lessonBlueprint = await curriculumLoader.loadLesson({
          course: "Geometry",
          unit: "Unit 1",
          lesson: "1.1"
        });

        const lessonModel =
          curriculumEngine.buildLessonModel(lessonBlueprint);

        const instructionPlan =
          learningIntelligenceEngine.buildInstructionPlan(lessonModel);

        const knowledgeGraph =
          knowledgeGraphEngine.buildGraph(instructionPlan);

        const dependencyAnalysis =
  knowledgeDependencyEngine.analyzeDependencies(knowledgeGraph);

dependencyAnalysis.lessonId =
  lessonModel.id ||
  lessonModel.lessonId ||
  lessonBlueprint.id ||
  `${lessonModel.course}-${lessonModel.unit}-${lessonModel.lesson}`;

        const instructionSequence =
  instructionSequencingEngine.buildSequence(dependencyAnalysis);

        const instructionDecisions =
  instructionDecisionEngine.decide({
    instructionSequence
  });

        const resourcePlan =
  instructionResourcePlanner.buildResourcePlan(
    instructionDecisions
  );

        const assetSpecifications =
  instructionAssetSpecificationEngine.buildSpecifications(
    resourcePlan
  );
  console.log("ASSET SPECIFICATIONS:", assetSpecifications);

  const generationPlan =
  contentGenerationOrchestrator.buildGenerationPlan(
    assetSpecifications.specifications
  );

        const generationContext =
          generationContextEngine.buildContext({
            lessonModel,
            instructionPlan,
            knowledgeGraph,
            dependencyAnalysis,
            instructionSequence,
            instructionDecisions,
            resourcePlan,
            assetSpecifications,
            generationPlan
          });

        const checks = {
          hasContext: !!generationContext,
          correctType: generationContext.type === "generation_context",
          correctVersion: generationContext.version === "0.3.4",

          hasLessonModel: !!generationContext.lessonModel,
          hasInstructionPlan: !!generationContext.instructionPlan,
          hasKnowledgeGraph: !!generationContext.knowledgeGraph,
          hasDependencyAnalysis: !!generationContext.dependencyAnalysis,
          hasInstructionSequence: !!generationContext.instructionSequence,
          hasInstructionDecisions: !!generationContext.instructionDecisions,
          hasResourcePlan: !!generationContext.resourcePlan,
          hasAssetSpecifications: !!generationContext.assetSpecifications,

          hasGenerationPlan: !!generationContext.generationPlan,
          plannedNotGenerated:
            generationContext.generationStatus === "planned_not_generated",
          contentNotGenerated:
            generationContext.contentGenerated === false,
          readyForGenerators:
            generationContext.metadata.readyForGenerators === true,
          foundationPipelineComplete:
            generationContext.metadata.foundationPipelineComplete === true
        };

        const passed = Object.values(checks).every(Boolean);

        output.textContent += JSON.stringify(
          {
            status: passed ? "PASS" : "FAIL",
            checks,
            generationContext
          },
          null,
          2
        );
      } catch (error) {
        output.textContent += "FAIL\n\n";
        output.textContent += error.stack || error.message;
      }
    });
  </script>
</body>
</html>
