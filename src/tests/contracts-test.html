<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Geometry OS — Contracts Test</title>
</head>
<body>
  <h1>Geometry OS — Contracts Test</h1>

  <button id="runTestButton">Run Contracts Test</button>

  <pre id="output"></pre>

  <script type="module">
    import { curriculumLoader } from "../curriculum/curriculumLoader.js";
    import { curriculumEngine } from "../curriculum/curriculumEngine.js";
    import { learningIntelligenceEngine } from "../curriculum/learningIntelligenceEngine.js";
    import { knowledgeGraphEngine } from "../curriculum/knowledgeGraphEngine.js";
    import { knowledgeDependencyEngine } from "../knowledge/knowledgeDependencyEngine.js";

    import { knowledgeGraphContract } from "../contracts/knowledgeGraphContract.js";
    import { dependencyAnalysisContract } from "../contracts/dependencyAnalysisContract.js";

    const button = document.getElementById("runTestButton");
    const output = document.getElementById("output");

    button.addEventListener("click", async () => {
      try {
        output.textContent = "Running Geometry OS Contracts Test...";

        const lessonBlueprint = await curriculumLoader.loadLesson({
          course: "Geometry",
          unit: "Unit 1",
          lesson: "1.1"
        });

        const lessonModel =
          curriculumEngine.buildLessonModel(lessonBlueprint);

        const instructionPlan =
          learningIntelligenceEngine.buildInstructionPlan(lessonModel);

        const knowledgeGraph =
          knowledgeGraphEngine.buildGraph(instructionPlan);

        const knowledgeGraphValid =
          knowledgeGraphContract.validate(knowledgeGraph);

        const dependencyAnalysis =
          knowledgeDependencyEngine.analyzeDependencies(knowledgeGraph);

        const dependencyAnalysisValid =
          dependencyAnalysisContract.validate(dependencyAnalysis);

        const result = {
          status: "PASS",
          lessonId: lessonBlueprint.id,
          contractsValidated: {
            knowledgeGraphContract: knowledgeGraphValid,
            dependencyAnalysisContract: dependencyAnalysisValid
          },
          knowledgeGraph,
          dependencyAnalysis
        };

        output.textContent = JSON.stringify(result, null, 2);

        console.log("Contracts Test PASS:", result);
      } catch (error) {
        output.textContent = "ERROR:\n" + error.message;
        console.error("Contracts Test FAIL:", error);
      }
    });
  </script>
</body>
</html>
