<!DOCTYPE html>
<html>
<head>
  <title>Geometry OS Generation Test</title>
</head>
<body>
  <h1>Geometry OS — Question Generation Test</h1>

  <button id="generateBtn">Generate Question</button>

  <pre id="output"></pre>

  <script type="module">
    import {
      generateGeometryLesson11Question
    } from "./src/engine/generation/geometryQuestionEngine.js";

    const button = document.getElementById("generateBtn");
    const output = document.getElementById("output");

    button.addEventListener("click", () => {
      const question = generateGeometryLesson11Question();
      output.textContent = JSON.stringify(question, null, 2);
    });
  </script>
</body>
</html>
