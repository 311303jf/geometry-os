<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Geometry OS — Geometry Knowledge Library Metadata Test</title>
</head>
<body>
  <h1>Geometry OS — Geometry Knowledge Library Metadata Test</h1>

  <button id="runTestButton">Run Geometry Knowledge Library Metadata Test</button>

  <pre id="output"></pre>

  <script type="module">
    import { geometryKnowledgeLibrary } from "./src/geometry/knowledge/geometryKnowledgeLibrary.js";

    const button = document.getElementById("runTestButton");
    const output = document.getElementById("output");

    button.addEventListener("click", () => {
      try {
        const validation = geometryKnowledgeLibrary.validate();

        const concepts = geometryKnowledgeLibrary.listConcepts();
        const categories = geometryKnowledgeLibrary.listCategories();

        const allConceptsHaveVocabulary = concepts.every((concept) =>
          Array.isArray(concept.vocabulary) && concept.vocabulary.length > 0
        );

        const allConceptsHaveAliases = concepts.every((concept) =>
          Array.isArray(concept.aliases) && concept.aliases.length > 0
        );

        const allConceptsHaveFloridaBestDomains = concepts.every((concept) =>
          Array.isArray(concept.floridaBestDomains) &&
          concept.floridaBestDomains.includes("MA.912.GR")
        );

        const angleVocabularyConcepts =
          geometryKnowledgeLibrary.getConceptsByVocabularyTerm("vertex");

        const floridaBestGeometryConcepts =
          geometryKnowledgeLibrary.getConceptsByFloridaBestDomain("MA.912.GR");

        const classifyTriangleConcepts =
          geometryKnowledgeLibrary.getConceptsByProblemType("classify_triangle");

        const result = {
          test: "Geometry Knowledge Library Metadata Hardening v1.0.1",
          libraryVersion: validation.libraryVersion,
          conceptCount: validation.conceptCount,
          categoryCount: validation.categoryCount,
          hasConceptsArray: Array.isArray(concepts),
          hasCategoriesArray: Array.isArray(categories),
          allConceptsHaveVocabulary,
          allConceptsHaveAliases,
          allConceptsHaveFloridaBestDomains,
          vertexVocabularyMapped:
            angleVocabularyConcepts.some((concept) => concept.conceptId === "angles"),
          floridaBestGeometryConceptCount: floridaBestGeometryConcepts.length,
          classifyTriangleMapped:
            classifyTriangleConcepts.some((concept) => concept.conceptId === "triangles"),
          validationPassed: validation.valid,
          validationErrors: validation.errors,
          pass:
            validation.valid === true &&
            validation.libraryVersion === "v1.0.1" &&
            validation.conceptCount === 16 &&
            validation.categoryCount === 6 &&
            allConceptsHaveVocabulary === true &&
            allConceptsHaveAliases === true &&
            allConceptsHaveFloridaBestDomains === true &&
            angleVocabularyConcepts.some((concept) => concept.conceptId === "angles") &&
            floridaBestGeometryConcepts.length === 16 &&
            classifyTriangleConcepts.some((concept) => concept.conceptId === "triangles")
        };

        output.textContent = JSON.stringify(result, null, 2);
      } catch (error) {
        output.textContent = JSON.stringify(
          {
            test: "Geometry Knowledge Library Metadata Hardening v1.0.1",
            pass: false,
            error: error.message
          },
          null,
          2
        );
      }
    });
  </script>
</body>
</html>
